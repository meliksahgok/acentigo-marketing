# Yerel / sunucu: PostgreSQL + Next.js (Vercel yerine kendi Docker’ınız)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: acentigo
      POSTGRES_PASSWORD: acentigo
      POSTGRES_DB: acentigo
    volumes:
      - acentigo_pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acentigo -d acentigo"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://acentigo:acentigo@postgres:5432/acentigo?schema=public"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "canlida-mutlaka-degistirin-openssl-rand-base64-32"
      ADMIN_EMAIL: "admin@acentigo.com"
      ADMIN_PASSWORD: "degistir123"

volumes:
  acentigo_pg:
